<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bibix">
<meta name="theme-color" content="#0073ea">
<link rel="manifest" href="/app/manifest.json">
<link rel="apple-touch-icon" href="/bibix-logo.png">
<title>Bibix Projects</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #0073ea;
  --blue-dark: #0060c0;
  --blue-light: #cce4ff;
  --green: #00c875;
  --red: #e2445c;
  --orange: #fdab3d;
  --purple: #a25ddc;
  --bg: #f5f6f8;
  --card: #ffffff;
  --text: #323338;
  --text-muted: #676879;
  --border: #e6e9ef;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}

/* ── Screens ── */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  transition: transform var(--transition), opacity var(--transition);
  background: var(--bg);
  transform: translateX(100%);
  pointer-events: none;
  overflow: hidden;
}
.screen.active {
  transform: translateX(0);
  pointer-events: all;
}
.screen.slide-back {
  transform: translateX(-30%);
}

/* ── Top bar ── */
.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  min-height: 56px;
}
.topbar-title {
  font-size: 17px;
  font-weight: 600;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.topbar-back {
  width: 36px; height: 36px;
  border: none; background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  color: var(--blue);
  font-size: 20px;
  flex-shrink: 0;
  transition: background var(--transition);
}
.topbar-back:active { background: var(--blue-light); }
.topbar-action {
  padding: 6px 16px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
  transition: background var(--transition), transform var(--transition);
}
.topbar-action:active { background: var(--blue-dark); transform: scale(0.97); }
.topbar-action:disabled { background: var(--border); color: var(--text-muted); }

/* ── Scrollable content area ── */
.content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
}
.content-no-pad { padding: 0; }

/* ── Login screen ── */
#screen-login {
  transform: translateX(0);
  background: linear-gradient(160deg, #0060c0 0%, #0073ea 40%, #1eafff 100%);
}
.login-inner {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  padding-top: calc(var(--safe-top) + 32px);
}
.login-logo {
  width: 80px; height: 80px;
  background: white;
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  margin-bottom: 20px;
  overflow: hidden;
}
.login-logo img { width: 64px; height: auto; }
.login-appname {
  font-size: 28px;
  font-weight: 700;
  color: white;
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}
.login-tagline {
  font-size: 15px;
  color: rgba(255,255,255,0.8);
  margin-bottom: 40px;
}
.login-form {
  width: 100%;
  background: white;
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
}
.form-field {
  margin-bottom: 16px;
}
.form-field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-field input, .form-field select, .form-field textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 16px;
  color: var(--text);
  background: white;
  outline: none;
  transition: border-color var(--transition);
  -webkit-appearance: none;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--blue);
}
.form-field textarea {
  resize: none;
  min-height: 80px;
  font-family: inherit;
}
.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
}
.btn-primary:active { background: var(--blue-dark); transform: scale(0.98); }
.btn-primary:disabled { background: #c5e0ff; cursor: default; transform: none; }
.error-msg {
  background: #fff0f2;
  border: 1px solid #ffc5ce;
  color: var(--red);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 16px;
  display: none;
}

/* ── Home screen ── */
.home-header {
  background: var(--blue);
  padding: calc(var(--safe-top) + 20px) 20px 24px;
  color: white;
}
.home-greeting {
  font-size: 13px;
  opacity: 0.8;
  margin-bottom: 4px;
}
.home-name {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.home-logo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}
.home-logo-mini {
  width: 28px; height: 28px;
  background: rgba(255,255,255,0.25);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.home-logo-mini img { width: 22px; }
.home-app-label {
  font-size: 13px;
  opacity: 0.7;
  font-weight: 500;
}

.home-actions {
  padding: 20px 16px 8px;
}
.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.action-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 16px;
  box-shadow: var(--shadow);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: transform var(--transition), box-shadow var(--transition);
  border: 1.5px solid transparent;
  user-select: none;
}
.action-card:active {
  transform: scale(0.97);
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}
.action-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.action-icon.blue { background: #e8f3ff; }
.action-icon.green { background: #e0f9ee; }
.action-icon.purple { background: #f1eaff; }
.action-icon.orange { background: #fff4e3; }
.action-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.action-desc {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: -4px;
}
.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin: 20px 0 10px;
}

/* ── List items ── */
.list-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}
.list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.list-item:last-child { border-bottom: none; }
.list-item:active { background: #f5f6f8; }
.list-item-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--blue-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.list-item-text { flex: 1; min-width: 0; }
.list-item-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.list-item-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}
.list-item-chevron {
  color: var(--border);
  font-size: 18px;
  flex-shrink: 0;
}
.list-item.selected {
  background: #e8f3ff;
}
.list-item.selected .list-item-icon {
  background: var(--blue);
}

/* ── Step indicator ── */
.step-bar {
  display: flex;
  gap: 6px;
  padding: 12px 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.step-dot {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  transition: background var(--transition);
}
.step-dot.active { background: var(--blue); }
.step-dot.done { background: var(--green); }

/* ── Task form ── */
.task-name-input {
  width: 100%;
  font-size: 20px;
  font-weight: 600;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text);
  padding: 16px 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 20px;
  transition: border-color var(--transition);
}
.task-name-input:focus { border-bottom-color: var(--blue); }
.task-name-input::placeholder { color: var(--border); font-weight: 400; }

.col-fields { display: flex; flex-direction: column; gap: 8px; }

.col-field {
  background: var(--card);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow);
}
.col-field-label {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
  width: 76px;
  flex-shrink: 0;
}
.col-field-value {
  flex: 1;
  min-width: 0;
}
.col-field select, .col-field input[type="date"] {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  -webkit-appearance: none;
  cursor: pointer;
}
.col-field input[type="date"] { font-family: inherit; }

.status-pill {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  color: white;
  cursor: pointer;
}

/* ── Loading ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  padding: 48px 24px;
  color: var(--text-muted);
  font-size: 14px;
}
.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px;
  gap: 12px;
  color: var(--text-muted);
  text-align: center;
}
.empty-icon { font-size: 40px; }
.empty-text { font-size: 15px; font-weight: 500; color: var(--text); }
.empty-sub { font-size: 13px; }

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 24px);
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #323338;
  color: white;
  padding: 12px 20px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 9999;
  pointer-events: none;
  white-space: nowrap;
  max-width: 320px;
  text-align: center;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.success { background: var(--green); }
#toast.error { background: var(--red); }

/* ── Bottom nav ── */
.bottom-nav {
  display: flex;
  background: var(--card);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
  flex-shrink: 0;
}
.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 0 8px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 500;
  transition: color var(--transition);
  border: none;
  background: none;
  -webkit-tap-highlight-color: transparent;
}
.nav-tab .nav-icon { font-size: 22px; }
.nav-tab.active { color: var(--blue); }

/* ── Profile tab ── */
.profile-section {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.profile-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 20px 16px;
  border-bottom: 1px solid var(--border);
}
.avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}
.profile-name { font-size: 17px; font-weight: 600; }
.profile-email { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.profile-menu-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
  color: var(--text);
  font-size: 15px;
}
.profile-menu-item:last-child { border-bottom: none; }
.profile-menu-item:active { background: var(--bg); }
.profile-menu-item .pm-icon { font-size: 20px; width: 28px; text-align: center; }
.profile-menu-item.danger { color: var(--red); }

/* ── Subtask picker ── */
.item-pick-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
}
.item-pick-row:last-child { border-bottom: none; }
.item-pick-row:active { background: var(--bg); }
.item-pick-check {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: border-color var(--transition), background var(--transition);
}
.item-pick-row.selected .item-pick-check {
  background: var(--blue);
  border-color: var(--blue);
  color: white;
  font-size: 13px;
}
.item-pick-name { font-size: 15px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Group color dot ── */
.group-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div id="app">

  <!-- LOGIN -->
  <div class="screen active" id="screen-login">
    <div class="login-inner">
      <div class="login-logo">
        <img src="/bibix-logo.png" alt="Bibix">
      </div>
      <div class="login-appname">Bibix Projects</div>
      <div class="login-tagline">Manage your work anywhere</div>
      <div class="login-form">
        <div class="error-msg" id="login-error"></div>
        <div class="form-field">
          <label>Email</label>
          <input type="email" id="login-email" autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="form-field">
          <label>Password</label>
          <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
      </div>
    </div>
  </div>

  <!-- HOME -->
  <div class="screen" id="screen-home">
    <div class="home-header">
      <div class="home-logo-row">
        <div class="home-logo-mini"><img src="/bibix-logo.png" alt=""></div>
        <span class="home-app-label">Bibix Projects</span>
      </div>
      <div class="home-greeting">Good <span id="home-timeofday">day</span>,</div>
      <div class="home-name" id="home-username">–</div>
    </div>
    <div class="content">
      <div class="action-grid">
        <div class="action-card" onclick="startNewTask()">
          <div class="action-icon blue">✏️</div>
          <div>
            <div class="action-label">New Task</div>
            <div class="action-desc">Add to a board</div>
          </div>
        </div>
        <div class="action-card" onclick="startSubtask()">
          <div class="action-icon green">🔗</div>
          <div>
            <div class="action-label">Subtask</div>
            <div class="action-desc">Under existing task</div>
          </div>
        </div>
      </div>

      <div class="section-title">Quick Access</div>
      <div id="home-recent-boards" class="list-card">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
    <div class="bottom-nav">
      <button class="nav-tab active" onclick="showTab('home')">
        <span class="nav-icon">🏠</span>Home
      </button>
      <button class="nav-tab" onclick="showTab('boards')">
        <span class="nav-icon">📋</span>Boards
      </button>
      <button class="nav-tab" onclick="showTab('profile')">
        <span class="nav-icon">👤</span>Profile
      </button>
    </div>
  </div>

  <!-- BOARDS TAB -->
  <div class="screen" id="screen-boards">
    <div class="home-header">
      <div class="home-logo-row">
        <div class="home-logo-mini"><img src="/bibix-logo.png" alt=""></div>
        <span class="home-app-label">Bibix Projects</span>
      </div>
      <div class="home-name">My Boards</div>
    </div>
    <div class="content" id="boards-content">
      <div class="loading"><div class="spinner"></div></div>
    </div>
    <div class="bottom-nav">
      <button class="nav-tab" onclick="showTab('home')">
        <span class="nav-icon">🏠</span>Home
      </button>
      <button class="nav-tab active" onclick="showTab('boards')">
        <span class="nav-icon">📋</span>Boards
      </button>
      <button class="nav-tab" onclick="showTab('profile')">
        <span class="nav-icon">👤</span>Profile
      </button>
    </div>
  </div>

  <!-- PROFILE TAB -->
  <div class="screen" id="screen-profile">
    <div class="home-header">
      <div class="home-logo-row">
        <div class="home-logo-mini"><img src="/bibix-logo.png" alt=""></div>
        <span class="home-app-label">Bibix Projects</span>
      </div>
      <div class="home-name">My Account</div>
    </div>
    <div class="content" id="profile-content">
    </div>
    <div class="bottom-nav">
      <button class="nav-tab" onclick="showTab('home')">
        <span class="nav-icon">🏠</span>Home
      </button>
      <button class="nav-tab" onclick="showTab('boards')">
        <span class="nav-icon">📋</span>Boards
      </button>
      <button class="nav-tab active" onclick="showTab('profile')">
        <span class="nav-icon">👤</span>Profile
      </button>
    </div>
  </div>

  <!-- WIZARD: SELECT WORKSPACE -->
  <div class="screen" id="screen-workspace">
    <div class="topbar">
      <button class="topbar-back" onclick="back()">‹</button>
      <div class="topbar-title" id="ws-title">Select Workspace</div>
    </div>
    <div class="step-bar" id="ws-steps"></div>
    <div class="content content-no-pad" id="ws-list">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- WIZARD: SELECT BOARD -->
  <div class="screen" id="screen-board">
    <div class="topbar">
      <button class="topbar-back" onclick="back()">‹</button>
      <div class="topbar-title">Select Board</div>
    </div>
    <div class="step-bar" id="board-steps"></div>
    <div class="content content-no-pad" id="board-list">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- WIZARD: SELECT GROUP -->
  <div class="screen" id="screen-group">
    <div class="topbar">
      <button class="topbar-back" onclick="back()">‹</button>
      <div class="topbar-title">Select Group</div>
    </div>
    <div class="step-bar" id="group-steps"></div>
    <div class="content content-no-pad" id="group-list">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- WIZARD: SELECT PARENT TASK (subtask flow) -->
  <div class="screen" id="screen-parent">
    <div class="topbar">
      <button class="topbar-back" onclick="back()">‹</button>
      <div class="topbar-title">Select Parent Task</div>
      <button class="topbar-action" id="parent-next-btn" onclick="goToTaskForm()" disabled>Next</button>
    </div>
    <div class="step-bar" id="parent-steps"></div>
    <div class="content content-no-pad" id="parent-list">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- WIZARD: TASK FORM -->
  <div class="screen" id="screen-taskform">
    <div class="topbar">
      <button class="topbar-back" onclick="back()">‹</button>
      <div class="topbar-title" id="taskform-title">New Task</div>
      <button class="topbar-action" id="save-btn" onclick="saveTask()">Save</button>
    </div>
    <div class="step-bar" id="taskform-steps"></div>
    <div class="content">
      <input class="task-name-input" id="task-name" type="text" placeholder="Task name…" autocomplete="off">
      <div id="col-fields" class="col-fields"></div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
const API = '';  // same origin
var token = localStorage.getItem('bibix_token');
var user = JSON.parse(localStorage.getItem('bibix_user') || 'null');

// wizard state
var wiz = {};

// ── API helpers ──────────────────────────────────────────────────────────────

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ── Toast ────────────────────────────────────────────────────────────────────

let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Screen navigation ────────────────────────────────────────────────────────

let screenStack = [];

function showScreen(id) {
  const current = screenStack[screenStack.length - 1];
  if (current) {
    const el = document.getElementById('screen-' + current);
    if (el) { el.classList.remove('active'); el.classList.add('slide-back'); }
  }
  const next = document.getElementById('screen-' + id);
  if (next) { next.classList.remove('slide-back'); next.classList.add('active'); }
  screenStack.push(id);
}

function back() {
  if (screenStack.length < 2) return;
  const current = screenStack.pop();
  const prev = screenStack[screenStack.length - 1];
  const el = document.getElementById('screen-' + current);
  if (el) { el.classList.remove('active'); }
  const prevEl = document.getElementById('screen-' + prev);
  if (prevEl) { prevEl.classList.remove('slide-back'); prevEl.classList.add('active'); }
}

function resetToHome() {
  // Clear stack and go back to home
  const allScreens = document.querySelectorAll('.screen');
  allScreens.forEach(s => { s.classList.remove('active', 'slide-back'); });
  screenStack = ['home'];
  document.getElementById('screen-home').classList.add('active');
}

function showTab(tab) {
  const tabs = ['home', 'boards', 'profile'];
  const allScreens = document.querySelectorAll('.screen');
  allScreens.forEach(s => { s.classList.remove('active', 'slide-back'); });
  screenStack = [tab];
  document.getElementById('screen-' + tab).classList.add('active');
  // Update nav tabs
  document.querySelectorAll('.nav-tab').forEach((btn, i) => {
    const parentScreen = btn.closest('.screen');
    if (parentScreen && parentScreen.id === 'screen-' + tab) {
      document.querySelectorAll('#screen-' + tab + ' .nav-tab').forEach((b, bi) => {
        b.classList.toggle('active', tabs[bi] === tab);
      });
    }
  });
  if (tab === 'boards') loadBoardsTab();
  if (tab === 'profile') renderProfile();
}

// ── Steps bar ────────────────────────────────────────────────────────────────

function renderSteps(containerId, total, current) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = Array.from({length: total}, (_, i) => {
    const cls = i < current ? 'done' : i === current ? 'active' : '';
    return `<div class="step-dot ${cls}"></div>`;
  }).join('');
}

// ── Login ────────────────────────────────────────────────────────────────────

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errEl.style.display = 'none';
  if (!email || !pwd) { errEl.textContent = 'Please enter email and password.'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const data = await api('POST', '/api/auth/login', { email, password: pwd });
    token = data.token;
    user = data.user;
    localStorage.setItem('bibix_token', token);
    localStorage.setItem('bibix_user', JSON.stringify(user));
    onLoggedIn();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function onLoggedIn() {
  const h = new Date().getHours();
  document.getElementById('home-timeofday').textContent = h < 12 ? 'morning' : h < 18 ? 'afternoon' : 'evening';
  document.getElementById('home-username').textContent = user.name;

  const loginScreen = document.getElementById('screen-login');
  loginScreen.classList.remove('active');
  screenStack = ['home'];
  document.getElementById('screen-home').classList.add('active');

  loadRecentBoards();
}

// ── Logout ───────────────────────────────────────────────────────────────────

function doLogout() {
  token = null; user = null;
  localStorage.removeItem('bibix_token');
  localStorage.removeItem('bibix_user');
  const allScreens = document.querySelectorAll('.screen');
  allScreens.forEach(s => s.classList.remove('active', 'slide-back'));
  screenStack = [];
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('login-password').value = '';
}

// ── Home: recent boards ──────────────────────────────────────────────────────

async function loadRecentBoards() {
  const el = document.getElementById('home-recent-boards');
  try {
    const workspaces = await api('GET', '/api/workspaces');
    if (!workspaces.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-text">No boards yet</div><div class="empty-sub">Boards you create will appear here</div></div>';
      return;
    }
    // Load boards for first few workspaces
    const allBoards = [];
    for (const ws of workspaces.slice(0, 3)) {
      const boards = await api('GET', `/api/boards/workspace/${ws.id}`);
      boards.forEach(b => b._wsName = ws.name);
      allBoards.push(...boards);
    }
    if (!allBoards.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No boards yet</div></div>';
      return;
    }
    el.innerHTML = allBoards.slice(0, 5).map(b => `
      <div class="list-item" onclick="openBoardDirect('${b.id}','${escHtml(b.name)}')">
        <div class="list-item-icon">${b.icon || '📋'}</div>
        <div class="list-item-text">
          <div class="list-item-title">${escHtml(b.name)}</div>
          <div class="list-item-sub">${escHtml(b._wsName)}</div>
        </div>
        <div class="list-item-chevron">›</div>
      </div>`).join('');
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">${escHtml(e.message)}</div></div>`;
  }
}

// ── Boards tab ───────────────────────────────────────────────────────────────

async function loadBoardsTab() {
  const el = document.getElementById('boards-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const workspaces = await api('GET', '/api/workspaces');
    if (!workspaces.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-text">No workspaces</div></div>';
      return;
    }
    let html = '';
    for (const ws of workspaces) {
      const boards = await api('GET', `/api/boards/workspace/${ws.id}`);
      html += `<div class="section-title" style="padding:0 16px;">${escHtml(ws.name)}</div>`;
      if (!boards.length) {
        html += '<div style="padding:0 16px 12px;color:var(--text-muted);font-size:13px;">No boards</div>';
      } else {
        html += '<div class="list-card">' + boards.map(b => `
          <div class="list-item" onclick="openBoardDirect('${b.id}','${escHtml(b.name)}')">
            <div class="list-item-icon">${b.icon || '📋'}</div>
            <div class="list-item-text">
              <div class="list-item-title">${escHtml(b.name)}</div>
            </div>
            <div class="list-item-chevron">›</div>
          </div>`).join('') + '</div>';
      }
    }
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">${escHtml(e.message)}</div></div>`;
  }
}

// ── Quick add from board shortcut ────────────────────────────────────────────

async function openBoardDirect(boardId, boardName) {
  // Go straight to group selection for this board
  wiz = { mode: 'new', boardId, boardName };
  renderSteps('group-steps', 3, 2);
  showScreen('group');
  await loadGroups(boardId);
}

// ── NEW TASK wizard ──────────────────────────────────────────────────────────

async function startNewTask() {
  wiz = { mode: 'new' };
  renderSteps('ws-steps', 3, 0);
  document.getElementById('ws-title').textContent = 'Select Workspace';
  showScreen('workspace');
  await loadWorkspaces('new');
}

async function startSubtask() {
  wiz = { mode: 'subtask' };
  renderSteps('ws-steps', 5, 0);
  document.getElementById('ws-title').textContent = 'Select Workspace';
  showScreen('workspace');
  await loadWorkspaces('subtask');
}

async function loadWorkspaces(mode) {
  const el = document.getElementById('ws-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const workspaces = await api('GET', '/api/workspaces');
    if (!workspaces.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-text">No workspaces</div></div>';
      return;
    }
    el.innerHTML = '<div class="list-card">' + workspaces.map(ws => `
      <div class="list-item" onclick="selectWorkspace('${ws.id}','${escHtml(ws.name)}')">
        <div class="list-item-icon">🏢</div>
        <div class="list-item-text">
          <div class="list-item-title">${escHtml(ws.name)}</div>
          <div class="list-item-sub">${ws.role || ''}</div>
        </div>
        <div class="list-item-chevron">›</div>
      </div>`).join('') + '</div>';
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">${escHtml(e.message)}</div></div>`;
  }
}

async function selectWorkspace(id, name) {
  wiz.workspaceId = id;
  wiz.workspaceName = name;
  const steps = wiz.mode === 'subtask' ? 5 : 3;
  renderSteps('board-steps', steps, 1);
  showScreen('board');
  await loadBoards(id);
}

async function loadBoards(workspaceId) {
  const el = document.getElementById('board-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const boards = await api('GET', `/api/boards/workspace/${workspaceId}`);
    if (!boards.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No boards in this workspace</div></div>';
      return;
    }
    el.innerHTML = '<div class="list-card">' + boards.map(b => `
      <div class="list-item" onclick="selectBoard('${b.id}','${escHtml(b.name)}')">
        <div class="list-item-icon">${b.icon || '📋'}</div>
        <div class="list-item-text">
          <div class="list-item-title">${escHtml(b.name)}</div>
        </div>
        <div class="list-item-chevron">›</div>
      </div>`).join('') + '</div>';
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">${escHtml(e.message)}</div></div>`;
  }
}

async function selectBoard(id, name) {
  wiz.boardId = id;
  wiz.boardName = name;
  const steps = wiz.mode === 'subtask' ? 5 : 3;
  renderSteps('group-steps', steps, 2);
  showScreen('group');
  await loadGroups(id);
}

async function loadGroups(boardId) {
  const el = document.getElementById('group-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const board = await api('GET', `/api/boards/${boardId}`);
    wiz._boardData = board;
    if (!board.groups || !board.groups.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📁</div><div class="empty-text">No groups in this board</div></div>';
      return;
    }
    el.innerHTML = '<div class="list-card">' + board.groups.map(g => `
      <div class="list-item" onclick="selectGroup('${g.id}','${escHtml(g.name)}','${escHtml(g.color || '#0073ea')}')">
        <div class="list-item-icon" style="background:${g.color}20">
          <div class="group-dot" style="background:${g.color}"></div>
        </div>
        <div class="list-item-text">
          <div class="list-item-title">${escHtml(g.name)}</div>
        </div>
        <div class="list-item-chevron">›</div>
      </div>`).join('') + '</div>';
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">${escHtml(e.message)}</div></div>`;
  }
}

async function selectGroup(id, name, color) {
  wiz.groupId = id;
  wiz.groupName = name;
  wiz.groupColor = color;

  if (wiz.mode === 'subtask') {
    renderSteps('parent-steps', 5, 3);
    showScreen('parent');
    await loadParentItems();
  } else {
    goToTaskForm();
  }
}

async function loadParentItems() {
  const el = document.getElementById('parent-list');
  const nextBtn = document.getElementById('parent-next-btn');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  wiz.parentItemId = null;
  nextBtn.disabled = true;
  try {
    const board = wiz._boardData;
    const items = (board.items || []).filter(i => i.group_id === wiz.groupId && !i.parent_item_id);
    if (!items.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">No tasks in this group</div></div>';
      return;
    }
    el.innerHTML = '<div class="list-card">' + items.map(it => `
      <div class="item-pick-row" id="pick-${it.id}" onclick="pickParent('${it.id}')">
        <div class="item-pick-check" id="check-${it.id}">✓</div>
        <div class="item-pick-name">${escHtml(it.name)}</div>
      </div>`).join('') + '</div>';
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">${escHtml(e.message)}</div></div>`;
  }
}

function pickParent(id) {
  document.querySelectorAll('.item-pick-row').forEach(r => r.classList.remove('selected'));
  document.getElementById('pick-' + id).classList.add('selected');
  wiz.parentItemId = id;
  document.getElementById('parent-next-btn').disabled = false;
}

function goToTaskForm() {
  const steps = wiz.mode === 'subtask' ? 5 : 3;
  const stepIdx = steps - 1;
  renderSteps('taskform-steps', steps, stepIdx);
  document.getElementById('taskform-title').textContent = wiz.mode === 'subtask' ? 'New Subtask' : 'New Task';
  document.getElementById('task-name').value = '';
  renderColumnFields();
  showScreen('taskform');
  setTimeout(() => document.getElementById('task-name').focus(), 300);
}

// ── Column fields ────────────────────────────────────────────────────────────

let colValues = {};

async function renderColumnFields() {
  const el = document.getElementById('col-fields');
  colValues = {};
  const board = wiz._boardData;
  if (!board || !board.columns) { el.innerHTML = ''; return; }

  const cols = board.columns.filter(c => ['status','person','date','priority'].includes(c.type));
  if (!cols.length) { el.innerHTML = ''; return; }

  // Load users for person fields
  let users = [];
  if (cols.some(c => c.type === 'person')) {
    try { users = await api('GET', '/api/auth/users'); } catch {}
  }

  el.innerHTML = cols.map(col => {
    const s = col.settings || {};
    if (col.type === 'status' || col.type === 'priority') {
      const opts = s.options || defaultStatusOpts(col.type);
      const optsHtml = opts.map(o =>
        `<option value="${escHtml(o.label)}" style="color:${o.color}">${escHtml(o.label)}</option>`
      ).join('');
      return `
        <div class="col-field">
          <div class="col-field-label">${escHtml(col.name)}</div>
          <div class="col-field-value">
            <select onchange="colValues['${col.id}']=this.value" id="col-${col.id}">
              <option value="">— None —</option>
              ${optsHtml}
            </select>
          </div>
        </div>`;
    }
    if (col.type === 'person') {
      const optsHtml = users.map(u =>
        `<option value="${u.id}">${escHtml(u.name)}</option>`
      ).join('');
      return `
        <div class="col-field">
          <div class="col-field-label">${escHtml(col.name)}</div>
          <div class="col-field-value">
            <select onchange="colValues['${col.id}']=this.value" id="col-${col.id}">
              <option value="">— None —</option>
              ${optsHtml}
            </select>
          </div>
        </div>`;
    }
    if (col.type === 'date') {
      return `
        <div class="col-field">
          <div class="col-field-label">${escHtml(col.name)}</div>
          <div class="col-field-value">
            <input type="date" onchange="colValues['${col.id}']=this.value" id="col-${col.id}">
          </div>
        </div>`;
    }
    return '';
  }).join('');
}

function defaultStatusOpts(type) {
  if (type === 'priority') return [
    {label:'Critical',color:'#e2445c'},{label:'High',color:'#fdab3d'},
    {label:'Medium',color:'#0073ea'},{label:'Low',color:'#00c875'}
  ];
  return [
    {label:'Done',color:'#00c875'},{label:'Working on it',color:'#fdab3d'},
    {label:'Stuck',color:'#e2445c'},{label:'Not started',color:'#c4c4c4'}
  ];
}

// ── Save task ────────────────────────────────────────────────────────────────

async function saveTask() {
  const name = document.getElementById('task-name').value.trim();
  if (!name) { toast('Please enter a task name', 'error'); document.getElementById('task-name').focus(); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    const body = { group_id: wiz.groupId, name };
    if (wiz.parentItemId) body.parent_item_id = wiz.parentItemId;
    const item = await api('POST', '/api/items', body);

    // Save column values
    const board = wiz._boardData;
    if (board && board.columns) {
      const savePromises = board.columns
        .filter(col => colValues[col.id] && colValues[col.id] !== '')
        .map(col => api('PUT', `/api/items/${item.id}/values`, { column_id: col.id, value: colValues[col.id] }).catch(() => {}));
      await Promise.all(savePromises);
    }

    toast(wiz.mode === 'subtask' ? '✅ Subtask added!' : '✅ Task added!', 'success');
    resetToHome();
    loadRecentBoards();
  } catch (e) {
    toast(e.message, 'error');
    btn.disabled = false; btn.textContent = 'Save';
  }
}

// ── Profile ──────────────────────────────────────────────────────────────────

function renderProfile() {
  if (!user) return;
  const initials = user.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  const color = user.avatar_color || '#0073ea';
  const el = document.getElementById('profile-content');
  el.innerHTML = `
    <div class="profile-section">
      <div class="profile-header">
        <div class="avatar" style="background:${color}">${initials}</div>
        <div>
          <div class="profile-name">${escHtml(user.name)}</div>
          <div class="profile-email">${escHtml(user.email)}</div>
        </div>
      </div>
    </div>
    <div class="profile-section">
      <div class="profile-menu-item" onclick="showTab('boards')">
        <span class="pm-icon">📋</span> My Boards
      </div>
      <div class="profile-menu-item" onclick="startNewTask()">
        <span class="pm-icon">✏️</span> New Task
      </div>
      <div class="profile-menu-item" onclick="startSubtask()">
        <span class="pm-icon">🔗</span> Add Subtask
      </div>
    </div>
    <div class="profile-section">
      <div class="profile-menu-item danger" onclick="doLogout()">
        <span class="pm-icon">🚪</span> Sign Out
      </div>
    </div>
    <div style="text-align:center;color:var(--text-muted);font-size:12px;margin-top:24px;">
      Bibix Projects · Mobile App
    </div>`;
}

// ── Boards tab: board detail shortcut ────────────────────────────────────────
// Allow tapping a board to jump to group selection

// ── Utils ────────────────────────────────────────────────────────────────────

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Service Worker ───────────────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/app/sw.js').catch(() => {});
}

// ── Init ─────────────────────────────────────────────────────────────────────

(function init() {
  if (token && user) {
    onLoggedIn();
  }
})();
</script>
</body>
</html>
