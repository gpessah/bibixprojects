---
deployment:
  tasks:
    # 1. Install backend dependencies (production only, no devDependencies)
    - export REPO=$HOME/repositories/monday
    - export APP=$HOME/bibix.ailabstech.com

    - /usr/local/bin/npm install --prefix $APP/backend --omit=dev

    # 2. Install frontend dependencies and build
    - /usr/local/bin/npm install --prefix $APP/frontend

    - /usr/local/bin/npm run build --prefix $APP/frontend

    # 3. Copy the built React app into backend/public so Express can serve it
    - mkdir -p $APP/backend/public
    - cp -r $APP/frontend/dist/. $APP/backend/public/

    # 4. Restart the Node.js app (Passenger picks this up automatically)
    - mkdir -p $APP/backend/tmp
    - touch $APP/backend/tmp/restart.txt
