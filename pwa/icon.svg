<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003f8a"/>
      <stop offset="50%" style="stop-color:#0073ea"/>
      <stop offset="100%" style="stop-color:#38b6ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="url(#glow)"/>

  <!-- Letter B -->
  <text
    x="108"
    y="360"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="310"
    font-weight="800"
    fill="white"
    letter-spacing="-10"
  >B</text>

  <!-- Small checkmark circle (accent) - bottom right -->
  <circle cx="370" cy="370" r="72" fill="#00c875"/>
  <polyline
    points="335,370 358,393 408,343"
    fill="none"
    stroke="white"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- "ix" small text under B -->
  <text
    x="245"
    y="430"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="88"
    font-weight="700"
    fill="rgba(255,255,255,0.6)"
    letter-spacing="2"
  >ix</text>
</svg>
